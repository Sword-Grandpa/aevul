<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aevul - Read Webtoons & Comics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
        .comic-card { transition: all 0.3s; }
        .comic-card:hover { transform: scale(1.05); }
    </style>
</head>
<body class="font-sans">
    <!-- Header -->
    <header class="bg-black sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="text-3xl font-bold text-emerald-400">AEVUL</div>
            </div>
            <nav class="flex gap-8 text-lg">
                <a href="#" class="hover:text-emerald-400">Home</a>
                <a href="#" class="hover:text-emerald-400">Latest</a>
                <a href="#" class="hover:text-emerald-400">Popular</a>
                <a href="#" class="hover:text-emerald-400">Genres</a>
            </nav>
            <div class="flex items-center gap-4">
                <input type="text" placeholder="Search comics..." 
                       class="bg-gray-900 border border-gray-700 rounded-full px-5 py-2 w-80 focus:outline-none focus:border-emerald-500">
                <button class="text-2xl"><i class="fas fa-user"></i></button>
            </div>
        </div>
    </header>

    <!-- Hero Banner -->
    <section class="relative h-[70vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-black via-transparent to-black z-10"></div>
        <img src="https://picsum.photos/id/1015/1920/1080" class="absolute inset-0 w-full h-full object-cover" alt="Hero">
        <div class="relative z-20 text-center max-w-3xl px-6">
            <h1 class="text-6xl font-bold mb-4">Discover Amazing Stories</h1>
            <p class="text-xl mb-8 text-gray-300">Read the best Webtoons, Manhwa & Comics on Aevul</p>
            <button class="bg-emerald-500 hover:bg-emerald-600 text-black font-semibold px-10 py-4 rounded-full text-lg">Start Reading Now</button>
        </div>
    </section>

    <!-- Popular This Week -->
    <section class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">
            <span class="text-emerald-400">🔥</span> Popular This Week
        </h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <!-- Repeat these cards -->
            <div class="comic-card bg-gray-900 rounded-xl overflow-hidden">
                <img src="https://picsum.photos/id/201/400/300" class="w-full h-64 object-cover">
                <div class="p-4">
                    <h3 class="font-semibold">Title of Comic 1</h3>
                    <p class="text-sm text-gray-400">Chapter 145 • Romance</p>
                </div>
            </div>
            <!-- Duplicate 5-6 more cards as needed -->
        </div>
    </section>

    <!-- Genres -->
    <section class="bg-gray-950 py-12">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-3xl font-bold mb-8">Browse by Genre</h2>
            <div class="flex flex-wrap gap-4">
                <span class="bg-gray-900 hover:bg-emerald-900 px-6 py-3 rounded-full cursor-pointer">Action</span>
                <span class="bg-gray-900 hover:bg-emerald-900 px-6 py-3 rounded-full cursor-pointer">Romance</span>
                <span class="bg-gray-900 hover:bg-emerald-900 px-6 py-3 rounded-full cursor-pointer">Fantasy</span>
                <span class="bg-gray-900 hover:bg-emerald-900 px-6 py-3 rounded-full cursor-pointer">Drama</span>
                <span class="bg-gray-900 hover:bg-emerald-900 px-6 py-3 rounded-full cursor-pointer">Horror</span>
            </div>
        </div>
    </section>

    <footer class="bg-black py-12 text-center text-gray-500">
        © 2026 Aevul.bd.com • All Rights Reserved
    </footer>

    <script>
        // You can add more JS later
        console.log("Aevul Site Loaded");
    </script>
</body>
</html>
